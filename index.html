<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <title>Mundo Pastas</title>


</head>
<body>

<header class="header">
  <img src="img/banner.png" alt="Mundo Pastas">
</header>



<h1>Mundo Pastas</h1>

<section class="menu">
  <h2>Menú</h2>
  <div class="grid" id="menu-container"></div>
</section>

<div class="carrito">
  <div class="carrito-icono">🛒</div>

  <div class="pedido-box">
  
    <div class="barra-carrito">
      <span>Tu pedido</span>
      <button class="btn-cerrar">✕</button>
    </div>

    <p id="mensaje-vacio">No hay items en el carrito de compras</p>

    <div id="lista-pedido"></div>
    <p id="total">Total: $0</p>
    <button onclick="enviarWhatsApp()">Pedir</button>
  </div>
</div>

<script src="categorias.js"></script>
<script src="carrito.js"></script>
<script src="script.js"></script>

</body>
</html>
